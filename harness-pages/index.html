<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>T3 Mobile Test Harness</title>
<style>
body { margin:0; font-family: Arial, sans-serif; background:#111827; color:#f9fafb; }
.page { min-height:100vh; display:flex; flex-direction:column; }
.header { padding:24px 20px 12px; font-size:28px; font-weight:700; color:#8B7BFF; }
.content { flex:1; padding:0 20px 20px; color:#d1d5db; }
.composer { position:sticky; bottom:0; background:#0f172a; padding:16px; border-top:1px solid #263041; }
[data-chat-composer-form] textarea { width:100%; min-height:120px; box-sizing:border-box; padding:14px; font-size:16px; border-radius:12px; border:1px solid #374151; background:#111827; color:#fff; }
[data-chat-composer-footer] { margin-top:12px; display:flex; justify-content:flex-end; gap:10px; }
button { border:none; border-radius:12px; background:#1f2937; color:#fff; width:44px; height:44px; font-size:20px; }
.log { margin-top:16px; padding:12px; border-radius:12px; background:#1f2937; color:#93c5fd; font-size:14px; }
</style>
</head>
<body>
<div class="page">
  <div class="header">T3 Mobile Test Harness</div>
  <div class="content">
    <p>This page mimics part of the T3 composer so the Android wrapper can be tested locally.</p>
    <div class="log" id="log">Waiting for paste event...</div>
  </div>
  <div class="composer">
    <form data-chat-composer-form>
      <textarea placeholder="Type here"></textarea>
      <div data-chat-composer-footer>
        <button type="button" aria-label="mic">M</button>
        <button type="button" aria-label="more"><svg width="18" height="18" viewBox="0 0 24 24"><circle cx="5" cy="12" r="2" fill="currentColor"></circle><circle cx="12" cy="12" r="2" fill="currentColor"></circle><circle cx="19" cy="12" r="2" fill="currentColor"></circle></svg></button>
      </div>
    </form>
  </div>
</div>
<script>
document.querySelector('textarea').addEventListener('paste', (event) => {
  const items = event.clipboardData?.items || [];
  const files = [...items].filter((item) => item.kind === 'file').length;
  document.getElementById('log').textContent = files > 0
    ? `Received ${files} image item(s) through paste.`
    : 'Paste event fired without image data.';
});
</script>
</body>
</html>
