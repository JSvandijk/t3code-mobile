name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and build tools
        shell: pwsh
        run: |
          sdkmanager "platforms;android-35" "build-tools;36.1.0"

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches package version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$version") {
            throw "Tag $env:GITHUB_REF_NAME does not match package.json version v$version."
          }
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Run smoke checks
        run: npm test

      - name: Build release APK
        shell: cmd
        env:
          APK_REQUIRE_RELEASE_SIGNING: "true"
          APK_VERSION_NAME: ${{ steps.version.outputs.version }}
          APK_KEYSTORE_BASE64: ${{ secrets.APK_KEYSTORE_BASE64 }}
          APK_KEYSTORE_PASSWORD: ${{ secrets.APK_KEYSTORE_PASSWORD }}
          APK_KEY_ALIAS: ${{ secrets.APK_KEY_ALIAS }}
          APK_KEY_PASSWORD: ${{ secrets.APK_KEY_PASSWORD }}
        run: build-apk.bat

      - name: Generate checksum
        shell: pwsh
        run: |
          $apk = "apk/build/output/T3Code-v${{ steps.version.outputs.version }}.apk"
          $hash = (Get-FileHash $apk -Algorithm SHA256).Hash.ToLower()
          "$hash  $(Split-Path $apk -Leaf)" | Set-Content "apk/build/output/T3Code-v${{ steps.version.outputs.version }}.apk.sha256"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apk/build/output/T3Code-v${{ steps.version.outputs.version }}.apk
            apk/build/output/T3Code-v${{ steps.version.outputs.version }}.apk.sha256
