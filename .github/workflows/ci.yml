name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke checks
        run: npm test

  android-build:
    runs-on: windows-latest
    needs: node-checks
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platforms and build tools
        shell: pwsh
        run: |
          sdkmanager "platforms;android-35" "build-tools;36.1.0"

      - name: Build APK
        shell: cmd
        run: build-apk.bat

      - name: Generate checksum
        shell: pwsh
        run: |
          $apk = Get-ChildItem apk/build/output/T3Code-v*.apk | Select-Object -First 1
          if (-not $apk) {
            throw "APK artifact not found."
          }
          $hash = (Get-FileHash $apk.FullName -Algorithm SHA256).Hash.ToLower()
          "$hash  $($apk.Name)" | Set-Content "$($apk.FullName).sha256"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: t3code-apk-dev
          if-no-files-found: error
          retention-days: 14
          path: |
            apk/build/output/T3Code-v*.apk
            apk/build/output/T3Code-v*.apk.sha256
